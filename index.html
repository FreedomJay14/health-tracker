<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康记录">
<meta name="theme-color" content="#1D9E75">
<title>每日健康记录</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --red-light: #FCEBEB;
    --red-mid: #F09595;
    --red-dark: #A32D2D;
    --bg: #F5F5F3;
    --card: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #6b7280;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --card: #1c1c1a; --border: rgba(255,255,255,0.1);
      --text: #f0ede8; --muted: #9ca3af; --green-light: #04342C; --red-light: #2d1010;
    }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  .topbar { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .topbar-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--green-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .topbar-icon i { font-size: 17px; color: var(--green); }
  .topbar-text { flex: 1; }
  .topbar h1 { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .topbar p { font-size: 11px; color: var(--muted); }
  .sync-btn { background: none; border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 4px; font-family: inherit; }
  .sync-btn i { font-size: 15px; }
  .sync-btn.syncing i { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs { display: flex; background: var(--card); border-bottom: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab i { font-size: 15px; }

  .content { flex: 1; overflow-y: auto; padding: 14px 12px 100px; }

  .section { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 14px 8px; }
  .field { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .field:last-child { border-bottom: none; }
  .field label { font-size: 14px; color: var(--text); min-width: 90px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
  .field label i { font-size: 16px; color: var(--muted); }
  .field input, .field textarea { flex: 1; border: none; background: none; font-size: 14px; color: var(--text); font-family: inherit; outline: none; }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
  .field .unit { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .field textarea { resize: none; min-height: 60px; line-height: 1.5; padding-top: 2px; }

  .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .toggle-label i { font-size: 16px; color: var(--muted); }
  .toggle { display: flex; gap: 6px; }
  .t-btn { padding: 5px 14px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); border-radius: 20px; cursor: pointer; background: none; font-family: inherit; color: var(--muted); transition: all 0.15s; }
  .t-btn.yes.active { background: var(--green-light); border-color: var(--green-mid); color: var(--green-dark); }
  .t-btn.no.active { background: var(--red-light); border-color: var(--red-mid); color: var(--red-dark); }

  .exercise-expand { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; border-bottom: 0.5px solid var(--border); }
  .exercise-expand.open { max-height: 80px; }
  .exercise-expand:last-child { border-bottom: none; }
  .exercise-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px 12px; background: var(--green-light); }
  .exercise-inner label { font-size: 13px; color: var(--green-dark); display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .exercise-inner input { flex: 1; border: none; border-bottom: 1px solid var(--green-mid); background: none; font-size: 14px; color: var(--green-dark); font-family: inherit; outline: none; padding: 2px 4px; max-width: 80px; }
  .exercise-inner input::placeholder { color: var(--green-mid); }
  .exercise-inner .unit { font-size: 13px; color: var(--green-dark); flex-shrink: 0; }

  .btn-save { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 456px; padding: 14px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(29,158,117,0.35); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

  /* History */
  .record-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .record-date-label { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 5px; }
  .record-date-label i { font-size: 14px; color: var(--muted); }
  .record-actions { display: flex; gap: 6px; }
  .icon-btn { background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 3px; font-family: inherit; }
  .icon-btn.edit { color: var(--green-dark); border-color: var(--green-mid); background: var(--green-light); }
  .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .record-item { font-size: 13px; }
  .record-item .rl { color: var(--muted); font-size: 11px; display: block; margin-bottom: 1px; }
  .record-item .rv { color: var(--text); font-weight: 500; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.yes { background: var(--green-light); color: var(--green-dark); }
  .badge.no { background: var(--red-light); color: var(--red-dark); }
  .badge.na { background: var(--bg); color: var(--muted); }
  .record-notes { font-size: 12px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); display: flex; gap: 5px; font-style: italic; }
  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty i { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }
  .empty p { font-size: 14px; }
  .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
  .loading i { font-size: 28px; display: block; margin-bottom: 8px; animation: spin 1s linear infinite; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-height: 90vh; overflow-y: auto; padding: 0 0 40px; transform: translateY(30px); transition: transform 0.25s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 16px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--card); z-index: 1; }
  .modal-header h2 { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted); padding: 2px 6px; }
  .modal-body { padding: 14px 12px; }
  .modal-section { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .modal-section .section-title { background: none; }
  .modal-field { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .modal-field:last-child { border-bottom: none; }
  .modal-field label { font-size: 14px; color: var(--text); min-width: 90px; flex-shrink: 0; }
  .modal-field input, .modal-field textarea { flex: 1; border: none; background: none; font-size: 14px; color: var(--text); font-family: inherit; outline: none; }
  .modal-field textarea { resize: none; min-height: 56px; line-height: 1.5; }
  .modal-field .unit { font-size: 13px; color: var(--muted); }
  .modal-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .modal-toggle-row:last-child { border-bottom: none; }
  .modal-exercise-expand { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; border-bottom: 0.5px solid var(--border); }
  .modal-exercise-expand.open { max-height: 80px; }
  .modal-exercise-inner { display: flex; align-items: center; gap: 10px; padding: 10px 14px 12px; background: var(--green-light); }
  .modal-exercise-inner label { font-size: 13px; color: var(--green-dark); flex-shrink: 0; }
  .modal-exercise-inner input { flex: 1; border: none; border-bottom: 1px solid var(--green-mid); background: none; font-size: 14px; color: var(--green-dark); font-family: inherit; outline: none; padding: 2px 4px; max-width: 80px; }
  .modal-exercise-inner .unit { font-size: 13px; color: var(--green-dark); }
  .modal-save-btn { width: 100%; padding: 13px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .modal-save-btn:disabled { opacity: 0.6; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon"><i class="ti ti-leaf"></i></div>
  <div class="topbar-text">
    <h1>每日健康记录</h1>
    <p>Daily Health Tracker</p>
  </div>
  <button class="sync-btn" id="sync-btn" onclick="syncAll()" title="同步云端">
    <i class="ti ti-refresh"></i><span>同步</span>
  </button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('record')"><i class="ti ti-pencil"></i>今日记录</button>
  <button class="tab" onclick="switchTab('history')"><i class="ti ti-history"></i>历史记录</button>
</div>

<div class="content">

  <!-- 今日记录 -->
  <div id="tab-record">
    <div class="section">
      <div class="section-title">基本信息</div>
      <div class="field">
        <label><i class="ti ti-calendar"></i>日期</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label><i class="ti ti-scale"></i>体重</label>
        <input type="number" id="f-weight" placeholder="0.0" step="0.1" min="0" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">饮食记录</div>
      <div class="field">
        <label><i class="ti ti-sun"></i>早餐</label>
        <input type="text" id="f-breakfast" placeholder="早餐内容…">
      </div>
      <div class="field">
        <label><i class="ti ti-bowl"></i>午餐</label>
        <input type="text" id="f-lunch" placeholder="配菜内容…">
      </div>
      <div class="field">
        <label><i class="ti ti-moon"></i>晚餐</label>
        <input type="text" id="f-dinner" placeholder="配菜内容…">
      </div>
    </div>

    <div class="section">
      <div class="section-title">摄入控制</div>
      <div class="toggle-row">
        <span class="toggle-label"><i class="ti ti-glass"></i>含糖饮料</span>
        <div class="toggle">
          <button class="t-btn yes" id="drink-yes" onclick="setToggle('drink','yes')">有</button>
          <button class="t-btn no" id="drink-no" onclick="setToggle('drink','no')">没有</button>
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label"><i class="ti ti-cookie"></i>零食</span>
        <div class="toggle">
          <button class="t-btn yes" id="snack-yes" onclick="setToggle('snack','yes')">有</button>
          <button class="t-btn no" id="snack-no" onclick="setToggle('snack','no')">没有</button>
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label"><i class="ti ti-gift"></i>奖励食品</span>
        <div class="toggle">
          <button class="t-btn yes" id="reward-yes" onclick="setToggle('reward','yes')">有</button>
          <button class="t-btn no" id="reward-no" onclick="setToggle('reward','no')">没有</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">运动记录</div>
      <div class="toggle-row">
        <span class="toggle-label"><i class="ti ti-run"></i>运动</span>
        <div class="toggle">
          <button class="t-btn yes" id="exercise-yes" onclick="setExercise('yes')">有</button>
          <button class="t-btn no" id="exercise-no" onclick="setExercise('no')">没有</button>
        </div>
      </div>
      <div class="exercise-expand" id="exercise-expand">
        <div class="exercise-inner">
          <label><i class="ti ti-clock"></i>运动时间</label>
          <input type="number" id="f-exercise-mins" placeholder="0" min="0" inputmode="numeric">
          <span class="unit">分钟</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">备注</div>
      <div class="field" style="align-items:flex-start;padding-top:10px;">
        <label style="margin-top:2px;"><i class="ti ti-notes"></i>备注</label>
        <textarea id="f-notes" placeholder="其他记录…" rows="2"></textarea>
      </div>
    </div>
  </div>

  <!-- 历史记录 -->
  <div id="tab-history" style="display:none;">
    <div id="history-list"></div>
  </div>

</div>

<button class="btn-save" id="btn-save" onclick="saveRecord()">
  <i class="ti ti-device-floppy"></i>保存今日记录
</button>

<!-- 编辑 Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2><i class="ti ti-edit" style="font-size:15px;vertical-align:-1px;margin-right:5px"></i>编辑记录</h2>
      <button class="modal-close" onclick="closeModalDirect()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="section-title">基本信息</div>
        <div class="modal-field">
          <label>日期</label>
          <input type="date" id="m-date">
        </div>
        <div class="modal-field">
          <label>体重</label>
          <input type="number" id="m-weight" placeholder="0.0" step="0.1" min="0" inputmode="decimal">
          <span class="unit">kg</span>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-title">饮食记录</div>
        <div class="modal-field">
          <label>早餐</label>
          <input type="text" id="m-breakfast" placeholder="早餐内容…">
        </div>
        <div class="modal-field">
          <label>午餐半碗饭</label>
          <input type="text" id="m-lunch" placeholder="配菜内容…">
        </div>
        <div class="modal-field">
          <label>晚餐半碗饭</label>
          <input type="text" id="m-dinner" placeholder="配菜内容…">
        </div>
      </div>
      <div class="modal-section">
        <div class="section-title">摄入控制</div>
        <div class="modal-toggle-row">
          <span class="toggle-label"><i class="ti ti-glass"></i>含糖饮料</span>
          <div class="toggle">
            <button class="t-btn yes" id="m-drink-yes" onclick="setModalToggle('drink','yes')">有</button>
            <button class="t-btn no" id="m-drink-no" onclick="setModalToggle('drink','no')">没有</button>
          </div>
        </div>
        <div class="modal-toggle-row">
          <span class="toggle-label"><i class="ti ti-cookie"></i>零食</span>
          <div class="toggle">
            <button class="t-btn yes" id="m-snack-yes" onclick="setModalToggle('snack','yes')">有</button>
            <button class="t-btn no" id="m-snack-no" onclick="setModalToggle('snack','no')">没有</button>
          </div>
        </div>
        <div class="modal-toggle-row">
          <span class="toggle-label"><i class="ti ti-gift"></i>奖励食品</span>
          <div class="toggle">
            <button class="t-btn yes" id="m-reward-yes" onclick="setModalToggle('reward','yes')">有</button>
            <button class="t-btn no" id="m-reward-no" onclick="setModalToggle('reward','no')">没有</button>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-title">运动记录</div>
        <div class="modal-toggle-row">
          <span class="toggle-label"><i class="ti ti-run"></i>运动</span>
          <div class="toggle">
            <button class="t-btn yes" id="m-exercise-yes" onclick="setModalExercise('yes')">有</button>
            <button class="t-btn no" id="m-exercise-no" onclick="setModalExercise('no')">没有</button>
          </div>
        </div>
        <div class="modal-exercise-expand" id="m-exercise-expand">
          <div class="modal-exercise-inner">
            <label><i class="ti ti-clock"></i>运动时间</label>
            <input type="number" id="m-exercise-mins" placeholder="0" min="0" inputmode="numeric">
            <span class="unit">分钟</span>
          </div>
        </div>
      </div>
      <div class="modal-section">
        <div class="section-title">备注</div>
        <div class="modal-field" style="align-items:flex-start;padding-top:10px;">
          <label style="margin-top:2px;">备注</label>
          <textarea id="m-notes" placeholder="其他记录…" rows="2"></textarea>
        </div>
      </div>
      <button class="modal-save-btn" id="modal-save-btn" onclick="saveEdit()">
        <i class="ti ti-device-floppy"></i>保存修改
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxzi09WEDe4Fs-OwFMfYOeQSM1ILztht2H5RY_YstOOc42STN74HEUlA8YjBPIbTzTl/exec';

// ── State ──
const state = { drink: null, snack: null, reward: null, exercise: null };
const mState = { drink: null, snack: null, reward: null, exercise: null };
let editingTs = null;
let cachedRecords = [];

// ── Init ──
function today() {
  const d = new Date();
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}
document.getElementById('f-date').value = today();

// ── Tabs ──
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active',(t==='record'&&i===0)||(t==='history'&&i===1)));
  document.getElementById('tab-record').style.display = t==='record'?'':'none';
  document.getElementById('tab-history').style.display = t==='history'?'':'none';
  document.getElementById('btn-save').style.display = t==='record'?'':'none';
  if(t==='history') loadHistory();
}

// ── Toggles (record form) ──
function setToggle(field, val) {
  state[field] = state[field]===val ? null : val;
  ['yes','no'].forEach(v => {
    document.getElementById(field+'-'+v).classList.toggle('active', state[field]===v);
  });
}
function setExercise(val) {
  state.exercise = state.exercise===val ? null : val;
  ['yes','no'].forEach(v => document.getElementById('exercise-'+v).classList.toggle('active', state.exercise===v));
  const ex = document.getElementById('exercise-expand');
  if(state.exercise==='yes') { ex.classList.add('open'); setTimeout(()=>document.getElementById('f-exercise-mins').focus(),50); }
  else { ex.classList.remove('open'); document.getElementById('f-exercise-mins').value=''; }
}

// ── Toggles (modal) ──
function setModalToggle(field, val) {
  mState[field] = mState[field]===val ? null : val;
  ['yes','no'].forEach(v => {
    document.getElementById('m-'+field+'-'+v).classList.toggle('active', mState[field]===v);
  });
}
function setModalExercise(val) {
  mState.exercise = mState.exercise===val ? null : val;
  ['yes','no'].forEach(v => document.getElementById('m-exercise-'+v).classList.toggle('active', mState.exercise===v));
  const ex = document.getElementById('m-exercise-expand');
  if(mState.exercise==='yes') { ex.classList.add('open'); }
  else { ex.classList.remove('open'); document.getElementById('m-exercise-mins').value=''; }
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── API calls ──
async function apiCall(body) {
  const action = body.action;
  const bodyParam = encodeURIComponent(JSON.stringify(body));
  const url = API + '?action=' + action + '&body=' + bodyParam;
  const res = await fetch(url, { method: 'GET' });
  return res.json();
}

// ── Save today ──
async function saveRecord() {
  const date = document.getElementById('f-date').value;
  if(!date) { showToast('请先选择日期'); return; }
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>保存中…';

  const rec = {
    ts: Date.now(),
    date,
    weight: document.getElementById('f-weight').value,
    breakfast: document.getElementById('f-breakfast').value,
    lunch: document.getElementById('f-lunch').value,
    dinner: document.getElementById('f-dinner').value,
    drink: state.drink||'',
    snack: state.snack||'',
    reward: state.reward||'',
    exercise: state.exercise||'',
    exerciseMins: state.exercise==='yes' ? document.getElementById('f-exercise-mins').value : '',
    notes: document.getElementById('f-notes').value
  };

  try {
    await apiCall({ action: 'save', record: rec });
    showToast('✓ 已保存至云端！');
    // update cache
    cachedRecords = cachedRecords.filter(r=>r.date!==date);
    cachedRecords.unshift(rec);
    cachedRecords.sort((a,b)=>b.date.localeCompare(a.date));
  } catch(e) {
    showToast('⚠ 保存失败，请检查网络');
  }
  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-device-floppy"></i>保存今日记录';
}

// ── Load history ──
async function loadHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '<div class="loading"><i class="ti ti-refresh"></i>从云端加载中…</div>';
  try {
    const res = await apiCall({ action: 'getAll' });
    cachedRecords = (res.data || []).filter(r=>r.date).sort((a,b)=>b.date.localeCompare(a.date));
    renderHistory();
  } catch(e) {
    el.innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i><p>无法连接云端<br>请检查网络后重试</p></div>';
  }
}

async function syncAll() {
  const btn = document.getElementById('sync-btn');
  btn.classList.add('syncing');
  await loadHistory();
  btn.classList.remove('syncing');
  showToast('✓ 已同步');
}

// ── Render history ──
function badge(val) {
  if(val==='yes') return '<span class="badge yes">有</span>';
  if(val==='no') return '<span class="badge no">没有</span>';
  return '<span class="badge na">未填</span>';
}
function exerciseBadge(val, mins) {
  if(val==='yes') return '<span class="badge yes">有' + (mins?' · '+mins+'分钟':'') + '</span>';
  if(val==='no') return '<span class="badge no">没有</span>';
  return '<span class="badge na">未填</span>';
}
function fmtDate(d) {
  if (!d) return '—';
  const s = String(d).trim();
  // 如果是 ISO 格式（含 T），转成本地时间再取日期
  if (s.indexOf('T') !== -1) {
    const local = new Date(s);
    const y = local.getFullYear();
    const m = local.getMonth() + 1;
    const day = local.getDate();
    return y + '年' + (m < 10 ? '0' + m : m) + '月' + (day < 10 ? '0' + day : day) + '日';
  }
  // 纯日期字符串 YYYY-MM-DD，直接截取
  const y = s.substring(0, 4);
  const m = s.substring(5, 7);
  const day = s.substring(8, 10);
  return y + '年' + m + '月' + day + '日';
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if(!cachedRecords.length) {
    el.innerHTML='<div class="empty"><i class="ti ti-clipboard-list"></i><p>暂无记录<br>快去填写今天的健康数据吧</p></div>';
    return;
  }
  el.innerHTML = cachedRecords.map(r=>`
    <div class="record-card">
      <div class="record-header">
        <span class="record-date-label"><i class="ti ti-calendar"></i>${fmtDate(r.date)}</span>
        <div class="record-actions">
          <button class="icon-btn edit" onclick="openEdit(${r.ts})"><i class="ti ti-pencil"></i>编辑</button>
          <button class="icon-btn" onclick="deleteRecord(${r.ts})"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      <div class="record-grid">
        <div class="record-item"><span class="rl">体重</span><span class="rv">${r.weight?r.weight+' kg':'—'}</span></div>
        <div class="record-item"><span class="rl">运动</span>${exerciseBadge(r.exercise, r.exerciseMins)}</div>
        <div class="record-item"><span class="rl">早餐</span><span class="rv">${r.breakfast||'—'}</span></div>
        <div class="record-item"><span class="rl">午餐半碗饭</span><span class="rv">${r.lunch||'—'}</span></div>
        <div class="record-item"><span class="rl">晚餐半碗饭</span><span class="rv">${r.dinner||'—'}</span></div>
        <div class="record-item"><span class="rl">含糖饮料</span>${badge(r.drink)}</div>
        <div class="record-item"><span class="rl">零食</span>${badge(r.snack)}</div>
        <div class="record-item"><span class="rl">奖励食品</span>${badge(r.reward)}</div>
      </div>
      ${r.notes?`<div class="record-notes"><i class="ti ti-notes" style="font-size:13px;flex-shrink:0;margin-top:1px"></i>${r.notes}</div>`:''}
    </div>
  `).join('');
}

// ── Delete ──
async function deleteRecord(ts) {
  if(!confirm('确认删除这条记录？此操作不可撤销。')) return;
  try {
    await apiCall({ action: 'delete', ts: String(ts) });
    cachedRecords = cachedRecords.filter(r=>String(r.ts)!==String(ts));
    renderHistory();
    showToast('已删除');
  } catch(e) {
    showToast('⚠ 删除失败');
  }
}

// ── Edit Modal ──
function openEdit(ts) {
  const rec = cachedRecords.find(r=>String(r.ts)===String(ts));
  if(!rec) return;
  editingTs = ts;

  document.getElementById('m-date').value = rec.date || '';
  document.getElementById('m-weight').value = rec.weight || '';
  document.getElementById('m-breakfast').value = rec.breakfast || '';
  document.getElementById('m-lunch').value = rec.lunch || '';
  document.getElementById('m-dinner').value = rec.dinner || '';
  document.getElementById('m-notes').value = rec.notes || '';

  // toggles
  ['drink','snack','reward'].forEach(f => {
    mState[f] = rec[f] || null;
    ['yes','no'].forEach(v => document.getElementById('m-'+f+'-'+v).classList.toggle('active', mState[f]===v));
  });

  mState.exercise = rec.exercise || null;
  ['yes','no'].forEach(v => document.getElementById('m-exercise-'+v).classList.toggle('active', mState.exercise===v));
  const exExp = document.getElementById('m-exercise-expand');
  if(mState.exercise==='yes') {
    exExp.classList.add('open');
    document.getElementById('m-exercise-mins').value = rec.exerciseMins || '';
  } else {
    exExp.classList.remove('open');
    document.getElementById('m-exercise-mins').value = '';
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if(e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  editingTs = null;
}

async function saveEdit() {
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>保存中…';

  const rec = {
    ts: editingTs,
    date: document.getElementById('m-date').value,
    weight: document.getElementById('m-weight').value,
    breakfast: document.getElementById('m-breakfast').value,
    lunch: document.getElementById('m-lunch').value,
    dinner: document.getElementById('m-dinner').value,
    drink: mState.drink||'',
    snack: mState.snack||'',
    reward: mState.reward||'',
    exercise: mState.exercise||'',
    exerciseMins: mState.exercise==='yes' ? document.getElementById('m-exercise-mins').value : '',
    notes: document.getElementById('m-notes').value
  };

  try {
    await apiCall({ action: 'save', record: rec });
    const idx = cachedRecords.findIndex(r=>String(r.ts)===String(editingTs));
    if(idx !== -1) cachedRecords[idx] = rec;
    cachedRecords.sort((a,b)=>b.date.localeCompare(a.date));
    renderHistory();
    closeModalDirect();
    showToast('✓ 修改已保存！');
  } catch(e) {
    showToast('⚠ 保存失败');
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="ti ti-device-floppy"></i>保存修改';
}
</script>
