<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="健康记录">
<meta name="theme-color" content="#1D9E75">
<title>每日健康记录</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-mid: #5DCAA5;
    --red-light: #FCEBEB;
    --red-mid: #F09595;
    --red-dark: #A32D2D;
    --bg: #F5F5F3;
    --card: #FFFFFF;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --muted: #6b7280;
    --radius: 12px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --card: #1c1c1a;
      --border: rgba(255,255,255,0.1);
      --text: #f0ede8;
      --muted: #9ca3af;
      --green-light: #04342C;
      --red-light: #2d1010;
    }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  .topbar { background: var(--card); border-bottom: 0.5px solid var(--border); padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
  .topbar-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--green-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .topbar-icon i { font-size: 17px; color: var(--green); }
  .topbar h1 { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .topbar p { font-size: 11px; color: var(--muted); }

  .tabs { display: flex; background: var(--card); border-bottom: 0.5px solid var(--border); }
  .tab { flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .tab i { font-size: 15px; }

  .content { flex: 1; overflow-y: auto; padding: 14px 12px 100px; }

  .section { background: var(--card); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 12px; overflow: hidden; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 12px 14px 8px; }
  .field { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .field:last-child { border-bottom: none; }
  .field label { font-size: 14px; color: var(--text); min-width: 90px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
  .field label i { font-size: 16px; color: var(--muted); }
  .field input, .field textarea { flex: 1; border: none; background: none; font-size: 14px; color: var(--text); font-family: inherit; outline: none; }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
  .field .unit { font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .field textarea { resize: none; min-height: 60px; line-height: 1.5; padding-top: 2px; }

  .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .toggle-label i { font-size: 16px; color: var(--muted); }
  .toggle { display: flex; gap: 6px; }
  .t-btn { padding: 5px 14px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); border-radius: 20px; cursor: pointer; background: none; font-family: inherit; color: var(--muted); transition: all 0.15s; }
  .t-btn.yes.active { background: var(--green-light); border-color: var(--green-mid); color: var(--green-dark); }
  .t-btn.no.active { background: var(--red-light); border-color: var(--red-mid); color: var(--red-dark); }

  .btn-save { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 456px; padding: 14px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 16px rgba(29,158,117,0.35); }

  .record-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .record-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .record-date-label { font-size: 13px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 5px; }
  .record-date-label i { font-size: 14px; color: var(--muted); }
  .del-btn { background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; color: var(--muted); font-size: 13px; }
  .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .record-item { font-size: 13px; }
  .record-item .rl { color: var(--muted); font-size: 11px; display: block; margin-bottom: 1px; }
  .record-item .rv { color: var(--text); font-weight: 500; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.yes { background: var(--green-light); color: var(--green-dark); }
  .badge.no { background: var(--red-light); color: var(--red-dark); }
  .badge.na { background: var(--bg); color: var(--muted); }
  .record-notes { font-size: 12px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); font-style: italic; display: flex; gap: 5px; }
  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty i { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-icon"><i class="ti ti-leaf"></i></div>
  <div>
    <h1>每日健康记录</h1>
    <p>Daily Health Tracker</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('record')"><i class="ti ti-pencil"></i>今日记录</button>
  <button class="tab" onclick="switchTab('history')"><i class="ti ti-history"></i>历史记录</button>
</div>

<div class="content" id="content">

  <div id="tab-record">
    <div class="section">
      <div class="section-title">基本信息</div>
      <div class="field">
        <label><i class="ti ti-calendar"></i>日期</label>
        <input type="date" id="f-date">
      </div>
      <div class="field">
        <label><i class="ti ti-scale"></i>体重</label>
        <input type="number" id="f-weight" placeholder="0.0" step="0.1" min="0" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
      <div class="field">
        <label><i class="ti ti-shoe"></i>步数</label>
        <input type="number" id="f-steps" placeholder="0" min="0" inputmode="numeric">
        <span class="unit">步</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">饮食记录</div>
      <div class="field">
        <label><i class="ti ti-sun"></i>早餐</label>
        <input type="text" id="f-breakfast" placeholder="早餐内容…">
      </div>
      <div class="field">
        <label><i class="ti ti-bowl"></i>午餐半碗饭</label>
        <input type="text" id="f-lunch" placeholder="配菜内容…">
      </div>
      <div class="field">
        <label><i class="ti ti-moon"></i>晚餐半碗饭</label>
        <input type="text" id="f-dinner" placeholder="配菜内容…">
      </div>
    </div>

    <div class="section">
      <div class="section-title">摄入控制</div>
      <div class="toggle-row">
        <span class="toggle-label"><i class="ti ti-glass"></i>含糖饮料</span>
        <div class="toggle">
          <button class="t-btn yes" id="drink-yes" onclick="setToggle('drink','yes')">有</button>
          <button class="t-btn no" id="drink-no" onclick="setToggle('drink','no')">没有</button>
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label"><i class="ti ti-cookie"></i>零食</span>
        <div class="toggle">
          <button class="t-btn yes" id="snack-yes" onclick="setToggle('snack','yes')">有</button>
          <button class="t-btn no" id="snack-no" onclick="setToggle('snack','no')">没有</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">备注</div>
      <div class="field" style="align-items:flex-start;padding-top:10px;">
        <label style="margin-top:2px;"><i class="ti ti-notes"></i>备注</label>
        <textarea id="f-notes" placeholder="其他记录…" rows="2"></textarea>
      </div>
    </div>
  </div>

  <div id="tab-history" style="display:none;">
    <div id="history-list"></div>
  </div>

</div>

<button class="btn-save" onclick="saveRecord()">
  <i class="ti ti-device-floppy"></i>保存今日记录
</button>

<div class="toast" id="toast"></div>

<script>
const state = { drink: null, snack: null };

function today() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
document.getElementById('f-date').value = today();

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active',(t==='record'&&i===0)||(t==='history'&&i===1)));
  document.getElementById('tab-record').style.display = t==='record'?'':'none';
  document.getElementById('tab-history').style.display = t==='history'?'':'none';
  if(t==='history') renderHistory();
}

function setToggle(field, val) {
  state[field] = state[field]===val ? null : val;
  ['yes','no'].forEach(v => {
    const el = document.getElementById(field+'-'+v);
    el.classList.remove('active');
    if(state[field]===v) el.classList.add('active');
  });
}

function getRecords() {
  try { return JSON.parse(localStorage.getItem('htr_v2')||'[]'); } catch { return []; }
}
function saveRecords(r) { localStorage.setItem('htr_v2', JSON.stringify(r)); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function saveRecord() {
  const date = document.getElementById('f-date').value;
  if(!date) { showToast('请先选择日期'); return; }
  const rec = {
    date,
    weight: document.getElementById('f-weight').value,
    steps: document.getElementById('f-steps').value,
    breakfast: document.getElementById('f-breakfast').value,
    lunch: document.getElementById('f-lunch').value,
    dinner: document.getElementById('f-dinner').value,
    drink: state.drink,
    snack: state.snack,
    notes: document.getElementById('f-notes').value,
    ts: Date.now()
  };
  const records = getRecords().filter(r=>r.date!==date);
  records.unshift(rec);
  saveRecords(records);
  showToast('✓ 已保存！');
}

function deleteRecord(ts) {
  if(!confirm('确认删除这条记录？')) return;
  saveRecords(getRecords().filter(r=>r.ts!==ts));
  renderHistory();
}

function fmtDate(d) {
  const [y,m,day] = d.split('-');
  return y+'年'+m+'月'+day+'日';
}

function badge(val) {
  if(val==='yes') return '<span class="badge yes">有</span>';
  if(val==='no') return '<span class="badge no">没有</span>';
  return '<span class="badge na">未填</span>';
}

function renderHistory() {
  const records = getRecords();
  const el = document.getElementById('history-list');
  if(!records.length) {
    el.innerHTML='<div class="empty"><i class="ti ti-clipboard-list"></i><p>暂无记录<br>快去填写今天的健康数据吧</p></div>';
    return;
  }
  el.innerHTML = records.map(r=>`
    <div class="record-card">
      <div class="record-header">
        <span class="record-date-label"><i class="ti ti-calendar"></i>${fmtDate(r.date)}</span>
        <button class="del-btn" onclick="deleteRecord(${r.ts})"><i class="ti ti-trash" style="font-size:13px;vertical-align:-1px"></i></button>
      </div>
      <div class="record-grid">
        <div class="record-item"><span class="rl">体重</span><span class="rv">${r.weight?r.weight+' kg':'—'}</span></div>
        <div class="record-item"><span class="rl">步数</span><span class="rv">${r.steps?Number(r.steps).toLocaleString()+' 步':'—'}</span></div>
        <div class="record-item"><span class="rl">早餐</span><span class="rv">${r.breakfast||'—'}</span></div>
        <div class="record-item"><span class="rl">午餐半碗饭</span><span class="rv">${r.lunch||'—'}</span></div>
        <div class="record-item"><span class="rl">晚餐半碗饭</span><span class="rv">${r.dinner||'—'}</span></div>
        <div class="record-item"><span class="rl">含糖饮料</span>${badge(r.drink)}</div>
        <div class="record-item"><span class="rl">零食</span>${badge(r.snack)}</div>
      </div>
      ${r.notes?`<div class="record-notes"><i class="ti ti-notes" style="font-size:13px;flex-shrink:0;margin-top:1px"></i>${r.notes}</div>`:''}
    </div>
  `).join('');
}
</script>
</body>
</html>
